<!DOCTYPE html>
<html lang="en" class="mdui-theme-auto">
<head>
  <meta charset="UTF-8">
  <meta name="renderer" content="webkit">
  <meta name="viewport" content="width=device-width, initial-scale=1.0,maximum-scale=5.0">
  <title>mdui - Material Design 3 UI components using Web Components.</title>
  <meta name="description" content="mdui is an front-end component library based on Material Design 3, using Web Components, supporting dynamic colors, dark mode, and lightweight efficiency.">
  <link rel="preconnect" href="https://cdn.w3cbus.com">
  <link rel="alternate" hreflang="en" href="https://www.mdui.org/en/">
  <link rel="alternate" hreflang="zh-cn" href="https://www.mdui.org/zh-cn/">
  <link rel="alternate" hreflang="x-default" href="https://www.mdui.org/en/">
  <link rel="preload" href="https://cdn.w3cbus.com/library/roboto/Roboto-Regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="canonical" href="https://www.mdui.org/en/">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    @font-face{font-family:'Material Icons';font-style:normal;font-weight:400;font-display:block;src:url(https://cdn.w3cbus.com/library/material-icons/MaterialIcons-Regular.woff2) format('woff2')}
    @font-face{font-family:'Material Icons Outlined';font-style:normal;font-weight:400;font-display:block;src:url(https://cdn.w3cbus.com/library/material-icons/MaterialIconsOutlined-Regular.woff2) format('woff2')}
    @font-face{font-family:'Material Icons Round';font-style:normal;font-weight:400;font-display:block;src:url(https://cdn.w3cbus.com/library/material-icons/MaterialIconsRound-Regular.woff2) format('woff2')}
    @font-face{font-family:'Material Icons Sharp';font-style:normal;font-weight:400;font-display:block;src:url(https://cdn.w3cbus.com/library/material-icons/MaterialIconsSharp-Regular.woff2) format('woff2')}
    @font-face{font-family:'Material Icons Two Tone';font-style:normal;font-weight:400;font-display:block;src:url(https://cdn.w3cbus.com/library/material-icons/MaterialIconsTwoTone-Regular.woff2) format('woff2')}
    :not(:defined){visibility:hidden}
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
